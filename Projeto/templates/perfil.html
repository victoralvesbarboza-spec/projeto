<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - DEAF Agendei+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            text-align: center;
            color: white;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
        }
        .content { padding: 30px; }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .info-label { font-weight: 600; color: #555; margin-bottom: 5px; }
        .info-value { color: #333; font-size: 1.1rem; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar"><i class="fas fa-user-circle"></i></div>
            <h1>Meu Perfil</h1>
        </div>
        <div class="content">
            <div class="info-item">
                <div class="info-label"><i class="fas fa-user"></i> Nome</div>
                <div class="info-value">{{ usuario.nome }}</div>
            </div>
            <div class="info-item">
                <div class="info-label"><i class="fas fa-envelope"></i> Email</div>
                <div class="info-value">{{ usuario.email }}</div>
            </div>
            <div class="info-item">
                <div class="info-label"><i class="fas fa-calendar-alt"></i> Data de Cadastro</div>
                <div class="info-value">{{ usuario.data_cadastro or 'Não informado' }}</div>
            </div>
            <a href="/quadras" class="back-link"><i class="fas fa-arrow-left"></i> Voltar para Quadras</a>
        </div>
    </div>
</body>
</html>
